import navi_init, { greet, vadd, vadd2, vadd3, cholesky, svd, potential_flow } from "./pkg/navi_wasm.js"
await navi_init()

document.getElementById("no_wasm_warning").style.display = "none";

function test_nalgebra() {

    let msdp = [
        [1.0, 0.8, 0.5],
        [0.8, 1.0, 0.4],
        [0.5, 0.4, 1.0]];


    let msdp_flat = [].concat(...msdp);  // flatten the matrix
    let msdp_array = Float64Array.from(msdp_flat);

    console.log("msdp", msdp);
    console.log("msdp_flat", msdp_flat);
    console.log("msdp_array", msdp_array);

    console.log("cholesky(msdp_flat)", cholesky(msdp_flat));  // flat matrix
    console.log("cholesky(msdp_array)", cholesky(msdp_array));
    // console.log("cholesky([1, 2, 3])", cholesky([1, 2, 3]));

    console.log("svd(msdp)", svd(msdp)); // JSON.stringify(

}

// test_nalgebra();

var flow_res = potential_flow({ n: 25, m: 25, r: 4.5 });
console.log("flow_res", flow_res);
console.log("grid", flow_res.grid);

for (let i = 0; i < flow_res.grid.length; i++) {
    for (let j = 0; j < flow_res.grid[i].length; j++) {
        if (flow_res.grid[i][j]==0)
            flow_res.grid[i][j] = null;  // for better visualization
    }
}

Plotly.newPlot('my_plot', [{
    z: flow_res.grid,
    type: 'contour',
    contours: {
        coloring: 'heatmap',  // 'heatmap' or 'lines'
        showlabels: true,
    }
}]);
